name: DevOps / Security

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, master]
  schedule:
    - cron: "0 5 25-31 * 0"  # last Sunday of month, 05:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preflight:
    # Schedule/dispatch: skip if no security-relevant files changed since last successful scan.
    # PR/push events skip this job; security jobs run unconditionally on those triggers.
    if: github.event_name != 'pull_request' && github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Check if scan needed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" != "schedule" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LAST_SHA=$(gh run list \
            --workflow "devops-security.yml" \
            --status success \
            --event schedule \
            --limit 1 \
            --json headSha \
            --jq '.[0].headSha // ""' 2>/dev/null || echo "")
          if [[ -z "$LAST_SHA" || "$LAST_SHA" == "null" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "$LAST_SHA" HEAD 2>/dev/null | \
            grep -cE '(Cargo\.(toml|lock)|go\.(mod|sum)|package(-lock)?\.json|yarn\.lock|requirements.*\.txt|Pipfile(\.lock)?|pyproject\.toml|pom\.xml|build\.gradle|\.github/)' \
            || echo 0)
          if [[ "$CHANGED" -gt 0 ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${CHANGED} security-relevant file(s) changed — running scan"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No security-relevant changes since last scan — skipping"
          fi

  gitleaks:
    needs: preflight
    if: |
      always() && (
        needs.preflight.result != 'success' ||
        needs.preflight.outputs.should_run == 'true'
      )
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-gitleaks.yml@caa797cc7baec52e99f21b86f532a4b7c88cf4fa # fix/grype-install-outside-scan-path
    with:
      working-directory: "."
      scan-history: true
      upload-sarif: false

  trivy-fs:
    needs: preflight
    if: |
      always() && (
        needs.preflight.result != 'success' ||
        needs.preflight.outputs.should_run == 'true'
      )
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scan-trivy-fs.yml@caa797cc7baec52e99f21b86f532a4b7c88cf4fa # fix/grype-install-outside-scan-path
    with:
      scan-ref: "."
      upload-sarif: false

  grype-fs:
    needs: preflight
    if: |
      always() && (
        needs.preflight.result != 'success' ||
        needs.preflight.outputs.should_run == 'true'
      )
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scan-grype-fs.yml@caa797cc7baec52e99f21b86f532a4b7c88cf4fa # fix/grype-install-outside-scan-path
    with:
      path: "."
      upload-sarif: false

  osv:
    needs: preflight
    if: |
      always() && (
        needs.preflight.result != 'success' ||
        needs.preflight.outputs.should_run == 'true'
      )
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-osv-scanner.yml@caa797cc7baec52e99f21b86f532a4b7c88cf4fa # fix/grype-install-outside-scan-path
    with:
      working-directory: "."
      upload-sarif: false
